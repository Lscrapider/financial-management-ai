server:
  port: 8081

spring:
  application:
    name: finance-service
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-1ef7eabc3eae4b439de96141b505462d}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen3.6-plus}
          temperature: ${DASHSCOPE_TEMPERATURE:0.3}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/finance_management}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:123456}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

stock:
  sync:
    enabled: ${STOCK_SYNC_ENABLED:true}
    initial-delay-ms: ${STOCK_SYNC_INITIAL_DELAY_MS:10000}
    fixed-delay-ms: ${STOCK_SYNC_FIXED_DELAY_MS:120000}
    request-interval-ms: ${STOCK_SYNC_REQUEST_INTERVAL_MS:1500}
    start-time: ${STOCK_SYNC_START_TIME:09:29}
    end-time: ${STOCK_SYNC_END_TIME:16:00}
    timezone: ${STOCK_SYNC_TIMEZONE:Asia/Shanghai}

index:
  sync:
    enabled: ${INDEX_SYNC_ENABLED:true}
    daily-kline-enabled: ${INDEX_DAILY_KLINE_SYNC_ENABLED:true}
    daily-kline-limit: ${INDEX_DAILY_KLINE_LIMIT:250}
    initial-delay-ms: ${INDEX_SYNC_INITIAL_DELAY_MS:15000}
    fixed-delay-ms: ${INDEX_SYNC_FIXED_DELAY_MS:300000}
    request-interval-ms: ${INDEX_SYNC_REQUEST_INTERVAL_MS:1500}
    start-time: ${INDEX_SYNC_START_TIME:09:29}
    end-time: ${INDEX_SYNC_END_TIME:16:00}
    timezone: ${INDEX_SYNC_TIMEZONE:Asia/Shanghai}

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_ADMIN_TOKEN:finance-management-local-token}
  org: ${INFLUXDB_ORG:finance}
  bucket: ${INFLUXDB_BUCKET:stock_intraday}
  stock-minute-measurement: ${INFLUXDB_STOCK_MINUTE_MEASUREMENT:stock_minute}
  timezone: ${INFLUXDB_TIMEZONE:Asia/Shanghai}
