name: financial-management-ai

services:
  database-init:
    build:
      context: ..
      dockerfile: database/Dockerfile
    container_name: finance-database-init
    env_file:
      - ${COMPOSE_ENV_FILE:-../.env}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_MANAGEMENT_PORT: ${RABBITMQ_MANAGEMENT_PORT}
      INFLUXDB_URL: ${INFLUXDB_URL}
    networks:
      - database-common-network

  minio-init:
    image: minio/mc:latest
    container_name: finance-minio-init
    env_file:
      - ${COMPOSE_ENV_FILE:-../.env}
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
      MINIO_POLICY_NAME: ${MINIO_POLICY_NAME:-finance-ocr-policy}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set common "$${MINIO_ENDPOINT}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "common/$${MINIO_OCR_BUCKET}"
        cat > /tmp/minio-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:*"],
              "Resource": [
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}",
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}/*"
              ]
            }
          ]
        }
        EOF
        mc admin user add common "$${MINIO_USER}" "$${MINIO_PASSWORD}" || true
        mc admin user enable common "$${MINIO_USER}"
        mc admin policy create common "$${MINIO_POLICY_NAME}" /tmp/minio-policy.json || true
        mc admin policy attach common "$${MINIO_POLICY_NAME}" --user "$${MINIO_USER}"
        mc anonymous set none "common/$${MINIO_OCR_BUCKET}"
    networks:
      - database-common-network

  finance-service:
    build:
      context: ../backend-java
      dockerfile: finance-service/Dockerfile
    container_name: finance-service
    ports:
      - "8081:8081"
    env_file:
      - ${COMPOSE_ENV_FILE:-../.env}
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      INFLUXDB_URL: ${INFLUXDB_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      AGENT_CALLBACK_URL: ${AGENT_CALLBACK_URL}
      AGENT_DATA_GATEWAY_URL: ${AGENT_DATA_GATEWAY_URL}
    depends_on:
      database-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - database-common-network

  finance-python-worker:
    build:
      context: ..
      dockerfile: ai-python/Dockerfile
      args:
        EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-base-zh-v1.5}
        HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    container_name: finance-python-worker
    env_file:
      - ${COMPOSE_ENV_FILE:-../.env}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      FINANCE_API_BASE_URL: ${FINANCE_API_BASE_URL}
    depends_on:
      database-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - database-common-network

  finance-frontend:
    build:
      context: ../frontend-vue
      dockerfile: Dockerfile
    container_name: finance-frontend
    ports:
      - "${FRONTEND_PORT:-5777}:80"
    environment:
      VITE_BACKEND_PROXY_TARGET: ${VITE_BACKEND_PROXY_TARGET:-http://finance-service:8081}
    depends_on:
      - finance-service
    networks:
      - database-common-network

networks:
  database-common-network:
    external: true
    name: database-common-network
