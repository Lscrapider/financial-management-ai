name: financial-management-ai

services:
  database-init:
    build:
      context: ..
      dockerfile: database/Dockerfile
    container_name: finance-database-init
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: common-postgres
      POSTGRES_PORT: 5432
      RABBITMQ_HOST: common-rabbitmq
      RABBITMQ_MANAGEMENT_PORT: 15672
      INFLUXDB_URL: http://common-influxdb:8086
    networks:
      - database-common-network

  minio-init:
    image: minio/mc:latest
    container_name: finance-minio-init
    env_file:
      - ../.env
    environment:
      MINIO_ENDPOINT: http://common-minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-root-password}
      MINIO_USER: ${MINIO_USER:-finance}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-finance-minio-password}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
      MINIO_POLICY_NAME: ${MINIO_POLICY_NAME:-finance-ocr-policy}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set common "$${MINIO_ENDPOINT}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "common/$${MINIO_OCR_BUCKET}"
        cat > /tmp/minio-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:*"],
              "Resource": [
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}",
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}/*"
              ]
            }
          ]
        }
        EOF
        mc admin user add common "$${MINIO_USER}" "$${MINIO_PASSWORD}" || true
        mc admin user enable common "$${MINIO_USER}"
        mc admin policy create common "$${MINIO_POLICY_NAME}" /tmp/minio-policy.json || true
        mc admin policy attach common "$${MINIO_POLICY_NAME}" --user "$${MINIO_USER}"
        mc anonymous set none "common/$${MINIO_OCR_BUCKET}"
    networks:
      - database-common-network

  finance-service:
    build:
      context: ../backend-java
      dockerfile: finance-service/Dockerfile
    container_name: finance-service
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    environment:
      POSTGRES_URL: jdbc:postgresql://common-postgres:5432/${POSTGRES_DB:-finance_management}
      POSTGRES_USERNAME: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance-password}
      POSTGRES_HOST: common-postgres
      POSTGRES_PORT: 5432
      INFLUXDB_URL: http://common-influxdb:8086
      RABBITMQ_HOST: common-rabbitmq
      MINIO_ENDPOINT: http://common-minio:9000
      MINIO_ROOT_USER: ${MINIO_USER:-finance}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-finance-minio-password}
      AGENT_CALLBACK_URL: http://finance-service:8081/internal/agent/callback
      AGENT_DATA_GATEWAY_URL: http://finance-service:8081/internal/agent/data/query
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_COMPLETIONS_PATH: ${DEEPSEEK_COMPLETIONS_PATH:-/chat/completions}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_TEMPERATURE: ${DEEPSEEK_TEMPERATURE:-0.3}
      DEEPSEEK_REASONING_EFFORT: ${DEEPSEEK_REASONING_EFFORT:-high}
      DEEPSEEK_THINKING_ENABLED: ${DEEPSEEK_THINKING_ENABLED:-true}
      DEEPSEEK_THINKING_TYPE: ${DEEPSEEK_THINKING_TYPE:-enabled}
    depends_on:
      database-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - database-common-network

  finance-python-worker:
    build:
      context: ..
      dockerfile: ai-python/Dockerfile
      args:
        EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-base-zh-v1.5}
    container_name: finance-python-worker
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: common-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-finance_management}
      POSTGRES_USERNAME: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance-password}
      RABBITMQ_HOST: common-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-finance}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-finance-rabbitmq-password}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-finance}
      MINIO_ENDPOINT: common-minio:9000
      MINIO_ROOT_USER: ${MINIO_USER:-finance}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-finance-minio-password}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
      FINANCE_API_BASE_URL: http://finance-service:8081
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_OCR_MODEL: ${QWEN_OCR_MODEL:-qwen-vl-ocr-latest}
    depends_on:
      database-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - database-common-network

  finance-frontend:
    build:
      context: ../frontend-vue
      dockerfile: Dockerfile
    container_name: finance-frontend
    ports:
      - "${FRONTEND_PORT:-5777}:5777"
    environment:
      VITE_BACKEND_PROXY_TARGET: http://finance-service:8081
    depends_on:
      - finance-service
    networks:
      - database-common-network

networks:
  database-common-network:
    external: true
    name: docker-database-common-network
