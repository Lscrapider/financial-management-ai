name: financial-management-ai

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: finance-postgres
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DATABASE:-finance_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finance-network

  database-init:
    build:
      context: ..
      dockerfile: database/Dockerfile
    container_name: finance-database-init
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    networks:
      - finance-network

  influxdb:
    image: influxdb:2.7
    container_name: finance-influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    env_file:
      - ../.env
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-admin123456}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-finance}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-stock_intraday}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-finance-management-local-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - finance-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: finance-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    env_file:
      - ../.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-finance}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-finance123456}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-finance}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ../database/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../database/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - finance-network

  minio:
    image: minio/minio:latest
    container_name: finance-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finance}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finance123456}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finance-network

  minio-init:
    image: minio/mc:latest
    container_name: finance-minio-init
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finance}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finance123456}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${MINIO_OCR_BUCKET}"
        mc anonymous set none "local/$${MINIO_OCR_BUCKET}"
    depends_on:
      - minio
    networks:
      - finance-network

  finance-service:
    build:
      context: ../backend-java
      dockerfile: finance-service/Dockerfile
    container_name: finance-service
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-finance_management}
      POSTGRES_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      INFLUXDB_URL: http://influxdb:8086
      RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://minio:9000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_COMPLETIONS_PATH: ${DEEPSEEK_COMPLETIONS_PATH:-/chat/completions}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_TEMPERATURE: ${DEEPSEEK_TEMPERATURE:-0.3}
      DEEPSEEK_REASONING_EFFORT: ${DEEPSEEK_REASONING_EFFORT:-high}
      DEEPSEEK_THINKING_ENABLED: ${DEEPSEEK_THINKING_ENABLED:-true}
      DEEPSEEK_THINKING_TYPE: ${DEEPSEEK_THINKING_TYPE:-enabled}
    depends_on:
      - postgres
      - influxdb
      - rabbitmq
      - minio
    networks:
      - finance-network

  finance-python-worker:
    build:
      context: ..
      dockerfile: ai-python/Dockerfile
    container_name: finance-python-worker
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-finance_management}
      POSTGRES_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-finance}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-finance123456}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-finance}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finance}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-finance123456}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_OCR_MODEL: ${QWEN_OCR_MODEL:-qwen-vl-ocr-latest}
    depends_on:
      - postgres
      - rabbitmq
      - minio
    networks:
      - finance-network

volumes:
  postgres-data:
  influxdb-data:
  influxdb-config:
  rabbitmq-data:
  minio-data:

networks:
  finance-network:
    name: finance-network
