name: finance-database

services:
  postgres:
    image: postgres:15
    container_name: finance-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_ADMIN_DATABASE:-finance_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finance-database-network

  database-init:
    build:
      context: ..
      dockerfile: database/Dockerfile
    container_name: finance-database-init
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    networks:
      - finance-database-network

  influxdb:
    image: influxdb:2.7
    container_name: finance-influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    env_file:
      - ../.env
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-admin123456}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-finance}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-stock_intraday}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-finance-management-local-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - finance-database-network

volumes:
  postgres-data:
  influxdb-data:
  influxdb-config:

networks:
  finance-database-network:
    name: finance-database-network
