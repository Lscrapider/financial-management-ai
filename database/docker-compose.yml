name: finance-database-init

services:
  database-init:
    build:
      context: ..
      dockerfile: database/Dockerfile
    container_name: finance-database-init
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: common-postgres
      POSTGRES_PORT: 5432
      RABBITMQ_HOST: common-rabbitmq
      RABBITMQ_MANAGEMENT_PORT: 15672
      INFLUXDB_URL: http://common-influxdb:8086
    networks:
      - database-common-network

  minio-init:
    image: minio/mc:latest
    container_name: finance-minio-init
    env_file:
      - ../.env
    environment:
      MINIO_ENDPOINT: http://common-minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-root-password}
      MINIO_USER: ${MINIO_USER:-finance}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-finance-minio-password}
      MINIO_OCR_BUCKET: ${MINIO_OCR_BUCKET:-finance-ocr}
      MINIO_POLICY_NAME: ${MINIO_POLICY_NAME:-finance-ocr-policy}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set common "$${MINIO_ENDPOINT}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "common/$${MINIO_OCR_BUCKET}"
        cat > /tmp/minio-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:*"],
              "Resource": [
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}",
                "arn:aws:s3:::$${MINIO_OCR_BUCKET}/*"
              ]
            }
          ]
        }
        EOF
        mc admin user add common "$${MINIO_USER}" "$${MINIO_PASSWORD}" || true
        mc admin user enable common "$${MINIO_USER}"
        mc admin policy create common "$${MINIO_POLICY_NAME}" /tmp/minio-policy.json || true
        mc admin policy attach common "$${MINIO_POLICY_NAME}" --user "$${MINIO_USER}"
        mc anonymous set none "common/$${MINIO_OCR_BUCKET}"
    networks:
      - database-common-network

networks:
  database-common-network:
    external: true
    name: docker-database-common-network
